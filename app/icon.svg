<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f7a38"/>
      <stop offset="1" stop-color="#0f3d1a"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="28.5" fill="none" stroke="#facc15" stroke-width="1.8"/>
  <circle cx="32" cy="32" r="25" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-dasharray="2.5 3.2"/>

  <!-- Flag -->
  <line x1="32" y1="10.5" x2="32" y2="22" stroke="#f8fafc" stroke-width="1.9" stroke-linecap="round"/>
  <path d="M32 10.5 L42 13.6 L32 16.7 Z" fill="#ef4444"/>

  <!-- Monogram -->
  <text x="32" y="43" text-anchor="middle"
        font-family="Inter, 'Arial Black', Arial, sans-serif"
        font-size="19" font-weight="800" fill="#ffffff" letter-spacing="0.5">SSL</text>

  <!-- Year -->
  <text x="32" y="53.5" text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="7.5" font-weight="700" fill="#facc15" letter-spacing="2">2026</text>
</svg>
